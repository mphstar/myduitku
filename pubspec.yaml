name: myduitku
description: "MyDuitKu - Personal Finance Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # State Management
  provider: ^6.1.2

  # Local Database - Use Hive 2.x for better compatibility
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Charts
  fl_chart: ^0.69.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

  # Export/Import
  file_picker: ^8.1.6
  share_plus: ^10.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  # App Icon & Splash
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#26A69A"
  image: "assets/images/logo_splash.png"
  android_12:
    color: "#26A69A"
    icon_background_color: "#26A69A"
    image: "assets/images/logo_splash.png"
  ios: true
  android: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
